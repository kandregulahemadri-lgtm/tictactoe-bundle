version: '3.9'
services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: tictactoe_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tictactoe
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://tictactoe_user:password123@postgres:5432/tictactoe
      DATABASE_SSL: 'false'
      JWT_SECRET: supersecretvalue
    ports:
      - '8001:8001'
    volumes:
      - ./backend:/usr/src/app
    command: ["node", "server.js"]

volumes:
  postgres-data:
